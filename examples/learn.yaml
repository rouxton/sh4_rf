# sh4_rf - examples/learn.yaml
# ============================================================
# LEARN MODE: capture raw RF codes from a remote control
# ============================================================
#
# Pinout confirmed by firmware reverse engineering:
#
#   Signal        | CBU pin | Notes
#   --------------|---------|--------------------------------
#   SCLK          | P14     | SPI clock
#   SDIO          | P16     | SPI data (bidirectional)
#   CSB           | P6      | Register chip select
#   FCSB          | P26     | FIFO chip select
#   DATA (TX+RX)  | P20     | Bidirectional: OUTPUT for TX, INPUT for RX
#   LED           | P9      | Status LED (optional)
#
# NOTE: P20 is used for BOTH TX and RX (confirmed by Tuya firmware disassembly).
#       The component switches P20 direction automatically:
#       OUTPUT during transmit, INPUT during receive.

substitutions:
  device_name: cbu-rf-bridge
  friendly_name: "CBU RF Bridge"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

bk72xx:
  board: cbu

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

api:
ota:
  - platform: esphome

external_components:
  - source:
      type: git
      url: https://github.com/rouxton/sh4_rf
      ref: main
    components: [sh4_rf]

sh4_rf:
  id: rf
  spi_enabled: true
  sclk_pin: P14
  sdio_pin: P16
  csb_pin:  P6
  fcsb_pin: P26
  data_pin:
    number: P20
  led_pin:  P9
  rx_mode:  direct
  dump: raw
  receiver_disabled: false
  filter: 50us
  tolerance: 25%
  start_pulse_min: 4ms
  start_pulse_max: 12ms
  end_pulse: 50ms
  buffer_size: 2000

switch:
  - platform: template
    name: "RF Receiver"
    id: rf_receiver_switch
    optimistic: true
    restore_mode: ALWAYS_ON
    on_turn_on:
      - sh4_rf.turn_on_receiver:
          receiver_id: rf
    on_turn_off:
      - sh4_rf.turn_off_receiver:
          receiver_id: rf

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic
