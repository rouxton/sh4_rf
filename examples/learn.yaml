# sh4_rf - examples/learn.yaml
# ============================================================
# LEARN MODE: capture raw RF codes from a remote control
# ============================================================
# 1. Flash this YAML to your CBU device
# 2. Open ESPHome logs
# 3. Press a button on your 433 MHz remote control
# 4. Copy the "Received Raw:" values from the logs
# 5. Paste them into examples/replay.yaml
# ============================================================
#
# Adjust pin numbers to match your board:
#
#   Variant A (S11, Moes UFO-R2-RF) - SCLK/SDIO connected:
#     spi_enabled: true
#     sclk_pin: P22, sdio_pin: P28, csb_pin: P26, fcsb_pin: P16
#     tx_pin: P7, rx_pin: P8
#
#   Variant B (no-name IR+RF blaster) - SCLK/SDIO not connected:
#     spi_enabled: false
#     csb_pin: P6, fcsb_pin: P26
#     tx_pin: P22, rx_pin: P20

substitutions:
  device_name: cbu-rf-bridge
  friendly_name: "CBU RF Bridge"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

bk72xx:
  board: cbu

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-ap"

logger:
  level: DEBUG   # must be DEBUG or higher to see Received Raw output

api:
ota:
  - platform: esphome

external_components:
  - source:
      type: git
      url: https://github.com/rouxton/sh4_rf
      ref: main
    components: [sh4_rf]

# ---- Variant B (no-name blaster, SCLK/SDIO not connected) ----
sh4_rf:
  id: rf
  spi_enabled: false        # set true for Variant A (S11 / Moes)
  csb_pin:  P6
  fcsb_pin: P26
  tx_pin:   P22             # CBU pin wired to SH4 GPIO1/DIN
  rx_pin:   P20             # CBU pin wired to SH4 GPIO2/DOUT
  rx_mode:  direct          # direct (default) or fifo
  dump: raw                 # print all received codes to the log
  receiver_disabled: false
  filter: 50us
  tolerance: 25%
  start_pulse_min: 4ms
  start_pulse_max: 12ms
  end_pulse: 50ms
  buffer_size: 2000

# Switch to enable/disable the receiver from Home Assistant
switch:
  - platform: template
    name: "RF Receiver"
    id: rf_receiver_switch
    optimistic: true
    restore_mode: ALWAYS_ON
    on_turn_on:
      - sh4_rf.turn_on_receiver:
          receiver_id: rf
    on_turn_off:
      - sh4_rf.turn_off_receiver:
          receiver_id: rf

# Optional: RX mode switch (direct vs FIFO)
# select:
#   - platform: template
#     name: "RX Mode"
#     options: ["direct", "fifo"]
#     initial_option: "direct"
#     optimistic: true
#     on_value:
#       - if:
#           condition:
#             lambda: 'return x == "fifo";'
#           then:
#             - sh4_rf.set_rx_mode:
#                 receiver_id: rf
#                 mode: fifo
#           else:
#             - sh4_rf.set_rx_mode:
#                 receiver_id: rf
#                 mode: direct

# Optional: status LED (P9 on S11)
# output:
#   - platform: gpio
#     id: status_led
#     pin: P9
# light:
#   - platform: binary
#     name: "Status LED"
#     output: status_led

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic
