# sh4_rf - examples/replay.yaml
# Replace the code: values with your captured codes from learn mode.

substitutions:
  device_name: cbu-rf-bridge
  friendly_name: "CBU RF Bridge"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

bk72xx:
  board: cbu

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: INFO

api:
ota:
  - platform: esphome

external_components:
  - source:
      type: git
      url: https://github.com/rouxton/sh4_rf
      ref: main
    components: [sh4_rf]

sh4_rf:
  id: rf
  spi_enabled: true
  sclk_pin: P14
  sdio_pin: P16
  csb_pin:  P6
  fcsb_pin: P26
  data_pin:
    number: P20
    inverted: true
  led_pin:  P9
  rx_mode:  direct
  dump: raw
  receiver_disabled: false
  filter: 50us
  tolerance: 25%
  start_pulse_min: 4ms
  start_pulse_max: 12ms
  end_pulse: 50ms
  buffer_size: 2000

button:
  - platform: template
    name: "Toggle Light"
    on_press:
      - remote_transmitter.transmit_raw:
          transmitter_id: rf
          code: [6035, -344, 406, -719, 751, -375, 375, -719, 751, -375, 375, -751, 719, -375, 407, -688, 781, -344, 407, -688, 750, -375, 751, -375, 751, -388, 362, -719, 751, -375, 375, -725, 401, -688, 406, -719, 751, -375]
          repeat:
            times: 8
            wait_time: 16ms

  - platform: template
    name: "Toggle Hood"
    on_press:
      - remote_transmitter.transmit_raw:
          transmitter_id: rf
          code: [6034, -375, 375, -719, 782, -343, 376, -719, 750, -375, 406, -719, 750, -347, 404, -719, 750, -375, 375, -719, 750, -344, 782, -344, 750, -375, 406, -688, 750, -375, 376, -750, 375, -750, 719, -375, 750, -344]
          repeat:
            times: 8
            wait_time: 16ms

  - platform: template
    name: "Speed Up"
    on_press:
      - remote_transmitter.transmit_raw:
          transmitter_id: rf
          code: [5967, -375, 375, -723, 776, -344, 406, -687, 750, -375, 406, -719, 749, -344, 406, -719, 749, -375, 375, -719, 749, -376, 374, -750, 750, -344]
          repeat:
            times: 8
            wait_time: 16ms

  - platform: template
    name: "Speed Down"
    on_press:
      - remote_transmitter.transmit_raw:
          transmitter_id: rf
          code: [5940, -375, 375, -750, 719, -375, 408, -718, 750, -344, 406, -688, 782, -344, 406, -719, 756, -338, 407, -719, 750, -375, 750, -375, 376, -719]
          repeat:
            times: 8
            wait_time: 16ms

switch:
  - platform: template
    name: "RF Receiver"
    id: rf_receiver_switch
    optimistic: true
    restore_mode: ALWAYS_ON
    on_turn_on:
      - sh4_rf.turn_on_receiver:
          receiver_id: rf
    on_turn_off:
      - sh4_rf.turn_off_receiver:
          receiver_id: rf

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic
